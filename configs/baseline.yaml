# ==================================================================================
# Baseline配置  (Spectral-DETR)
# GitHub: https://github.com/songyuexin666-wq/Sprectral-DETR
# ==================================================================================
# 用于消融实验对比（所有创新模块关闭，用作 RF-DETR 基线）

model:
  encoder: "dinov2_windowed_small"
  hidden_dim: 256
  resolution: 560
  pretrain_weights: "rf-detr-base.pth"
  patch_size: 14
  num_queries: 300
  num_select: 300
  
  # 所有创新点关闭
  use_lue: false
  use_fafd: false
  use_qcd: false

dataset:
  dataset_file: "coco"
  coco_path: "datasets"

training:
  batch_size: 12
  epochs: 75
  lr: 1e-4
  weight_decay: 1e-4
  lr_drop: 40
  clip_max_norm: 0.1
  checkpoint_interval: 25
  output_dir: "outputs/baseline"

loss:
  cls_loss_coef: 2.0
  bbox_loss_coef: 5.0
  giou_loss_coef: 2.0

eval:
  eval_interval: 5
  num_select: 300
