# ==================================================================================
# Spectral-DETR 完整配置: LUE + FAFD + QCD
# GitHub: https://github.com/songyuexin666-wq/Sprectral-DETR
# ==================================================================================

model:
  encoder: "dinov2_windowed_small"
  hidden_dim: 256
  resolution: 560
  pretrain_weights: "rf-detr-base.pth"
  patch_size: 14
  num_queries: 300
  num_select: 300

  # LUE: 不确定性估计 (独立辅助loss，不干扰主回归)
  use_lue: true
  lue_warmup_epochs: 15        # bbox收敛后再激活uncertainty loss

  # FAFD: 频域特征解耦
  use_fafd: true
  fafd_sparsity_weight: 1e-5
  fafd_alpha: 0.15            

  # QCD: Query对比去噪 (bbox稳定后启动，保证对比信号可靠)
  use_qcd: true
  qcd_temperature: 0.15
  qcd_weight: 0.3
  qcd_hard_negatives_k: 128
  qcd_start_epoch: 20

dataset:
  dataset_file: "coco"
  coco_path: "datasets"

training:
  batch_size: 12
  epochs: 75
  lr: 1e-4
  weight_decay: 1e-4
  lr_drop: 40
  clip_max_norm: 0.1
  checkpoint_interval: 25
  output_dir: "outputs/lue_fafd_qcd_full"

loss:
  cls_loss_coef: 2.0
  bbox_loss_coef: 5.0          # 与baseline完全一致，LUE不再削弱bbox梯度
  giou_loss_coef: 2.0
  lue_uncertainty_coef: 0.5   # uncertainty独立loss权重

eval:
  eval_interval: 5
  num_select: 300
